version: "3.8"

# ========================================
# MiyaShop 电商系统 — Docker Compose
# ========================================

services:
  # ---------- Spring Boot 后端 ----------
  backend:
    build:
      context: ./miyashop-backend
      dockerfile: Dockerfile
    container_name: miyashop-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/miyashop?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: miya-2022
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # 覆盖 RabbitMQ（无 RabbitMQ 时不阻塞）
      SPRING_RABBITMQ_LISTENER_SIMPLE_AUTO_STARTUP: "false"
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------- Go 图片服务器 ----------
  image-server:
    build:
      context: ./miyashop-image-server
      dockerfile: Dockerfile
      args:
        # 镜像拉取由 ~/.docker/daemon.json 的 registry-mirrors 统一代理
        GOLANG_IMAGE: ${GOLANG_IMAGE:-golang:1.22-alpine}
        ALPINE_IMAGE: ${ALPINE_IMAGE:-alpine:3.20}
        APK_MIRROR: ${APK_MIRROR:-mirrors.aliyun.com}
    container_name: miyashop-image-server
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      MIYASHOP_SERVER_PORT: "8081"
      MIYASHOP_SERVER_MODE: release
      MIYASHOP_S3_PROVIDER: tc
      MIYASHOP_S3_ENDPOINT: cos.ap-shanghai.myqcloud.com
      MIYASHOP_S3_REGION: ap-shanghai
      MIYASHOP_S3_BUCKET: miyashop-1317790566
      #MIYASHOP_S3_REGION: us-east-1
      #MIYASHOP_S3_BUCKET: miyashop-images
      # S3 AKSK — 优先用 MIYASHOP_S3_* 环境变量，为空时回退到 provider 原生变量
      # 本地 MinIO: minioadmin / minioadmin (默认)
      # 腾讯云 COS: COS_SECRET_ID / COS_SECRET_KEY
      # AWS S3:    AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
      # 阿里云 OSS: ALIBABA_CLOUD_ACCESS_KEY_ID / ALIBABA_CLOUD_ACCESS_KEY_SECRET
      MIYASHOP_S3_ACCESS_KEY: ${MIYASHOP_S3_ACCESS_KEY:-minioadmin}
      MIYASHOP_S3_SECRET_KEY: ${MIYASHOP_S3_SECRET_KEY:-minioadmin}
      MIYASHOP_S3_USE_SSL: "true"
      MIYASHOP_S3_PATH_STYLE: "false"
      MIYASHOP_JWT_SECRET: miyashop-secret-key-2024-very-long-and-secure-key-for-jwt-token-generation
      MIYASHOP_JWT_EXPIRATION: "86400"
      MIYASHOP_WATERMARK_ENABLED: "true"
      MIYASHOP_WATERMARK_TEXT: "MiyaShop"
      MIYASHOP_WATERMARK_POSITION: bottom-right
      MIYASHOP_LOG_LEVEL: info
      MIYASHOP_LOG_FORMAT: console
      TZ: Asia/Shanghai

  # ---------- 后台管理系统 ----------
  admin:
    build:
      context: ./miyashop-frontend/miyashop-admin
      dockerfile: Dockerfile
    container_name: miyashop-admin
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
