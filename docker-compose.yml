version: "3.8"

# ========================================
# MiyaShop 电商系统 — Docker Compose
# ========================================

services:
  # ---------- MySQL ----------
  mysql:
    image: mysql:8.0
    container_name: miyashop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: miya-2022
      MYSQL_DATABASE: miyashop
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./miyashop-backend/miyashop-web/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: miyashop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Spring Boot 后端 ----------
  backend:
    build:
      context: ./miyashop-backend
      dockerfile: Dockerfile
    container_name: miyashop-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/miyashop?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: miya-2022
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # 覆盖 RabbitMQ（无 RabbitMQ 时不阻塞）
      SPRING_RABBITMQ_LISTENER_SIMPLE_AUTO_STARTUP: "false"
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------- MinIO (S3 兼容对象存储) ----------
  minio:
    image: minio/minio:latest
    container_name: miyashop-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Go 图片服务器 ----------
  image-server:
    build:
      context: ./miyashop-image-server
      dockerfile: Dockerfile
    container_name: miyashop-image-server
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      MIYASHOP_SERVER_PORT: "8081"
      MIYASHOP_SERVER_MODE: release
      MIYASHOP_S3_PROVIDER: minio
      MIYASHOP_S3_ENDPOINT: minio:9000
      MIYASHOP_S3_REGION: us-east-1
      MIYASHOP_S3_BUCKET: miyashop-images
      MIYASHOP_S3_ACCESS_KEY: minioadmin
      MIYASHOP_S3_SECRET_KEY: minioadmin
      MIYASHOP_S3_USE_SSL: "false"
      MIYASHOP_S3_PATH_STYLE: "true"
      MIYASHOP_JWT_SECRET: miyashop-secret-key-2024-very-long-and-secure-key-for-jwt-token-generation
      MIYASHOP_JWT_EXPIRATION: "86400"
      MIYASHOP_WATERMARK_ENABLED: "true"
      MIYASHOP_WATERMARK_TEXT: "MiyaShop"
      MIYASHOP_WATERMARK_POSITION: bottom-right
      MIYASHOP_LOG_LEVEL: info
      MIYASHOP_LOG_FORMAT: console
      TZ: Asia/Shanghai
    depends_on:
      minio:
        condition: service_healthy

  # ---------- 后台管理系统 ----------
  admin:
    build:
      context: ./miyashop-frontend/miyashop-admin
      dockerfile: Dockerfile
    container_name: miyashop-admin
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ---------- 移动端商城 ----------
  h5:
    build:
      context: ./miyashop-frontend/miyashop-h5
      dockerfile: Dockerfile
    container_name: miyashop-h5
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  redis-data:
  minio-data:
